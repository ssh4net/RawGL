---
name: docs-pages

on:
  pull_request:
    paths:
      - ".github/workflows/docs-pages.yml"
      - "CMakeLists.txt"
      - "VERSION"
      - "README.md"
      - "LICENSE.md"
      - "cmake/rawgl_docs.cmake"
      - "cmake/rawgl_options.cmake"
      - "cmake/rawgl_report.cmake"
      - "docs/**"
      - "include/rawgl/**"
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - ".github/workflows/docs-pages.yml"
      - "CMakeLists.txt"
      - "VERSION"
      - "README.md"
      - "LICENSE.md"
      - "cmake/rawgl_docs.cmake"
      - "cmake/rawgl_options.cmake"
      - "cmake/rawgl_report.cmake"
      - "docs/**"
      - "include/rawgl/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Configure docs build
        run: >
          cmake -S . -B build -G Ninja
          -DRAWGL_DOCS_ONLY=ON
          -DRAWGL_BUILD_SPHINX_DOCS=ON

      - name: Build docs
        run: cmake --build build --target rawgl_docs_sphinx --parallel

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/docs/html

  deploy:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
